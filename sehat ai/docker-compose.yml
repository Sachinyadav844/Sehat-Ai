version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    restart: always
    container_name: sehat-postgres
    environment:
      POSTGRES_USER: sehat_user
      POSTGRES_PASSWORD: sehat_password
      POSTGRES_DB: sehatdb
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sehat_user"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    container_name: sehat-redis
    ports:
      - '6379:6379'
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:6.0
    restart: always
    container_name: sehat-mongodb
    ports:
      - '27017:27017'
    volumes:
      - mongodb-data:/data/db
    healthcheck:
      test: ["CMD", "mongo", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    restart: always
    container_name: sehat-qdrant
    ports:
      - '6333:6333'
    volumes:
      - qdrant-data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 10s
      timeout: 10s
      retries: 5

  backend:
    build:
      context: ./backend
    restart: always
    container_name: sehat-backend
    ports:
      - '4000:4000'
    environment:
      - DATABASE_URL=postgresql://sehat_user:sehat_password@postgres:5432/sehatdb
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=devsecret_change_in_production
      - JWT_REFRESH_SECRET=refresh_secret_change_in_production
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - TRUGEN_API_KEY=${TRUGEN_API_KEY}
      - TRUGEN_BASE_URL=${TRUGEN_BASE_URL:-https://api.trugen.ai/v1}
      - NODE_ENV=development
      - PORT=4000
      - AI_SERVICE_URL=http://ai:8000
      - BACKEND_URL=http://localhost:4000
      - FRONTEND_URL=http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  ai:
    build:
      context: ./ai
    restart: always
    container_name: sehat-ai
    ports:
      - '8000:8000'
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}      - REDIS_URL=redis://redis:6379
      - MONGO_URL=mongodb://mongodb:27017/sehat
      - QDRANT_URL=http://qdrant:6333
    depends_on:
      redis:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      qdrant:
        condition: service_healthy    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
    restart: always
    container_name: sehat-frontend
    ports:
      - '4173:4173'
    environment:
      - VITE_API_URL=http://localhost:4000
      - VITE_SOCKET_URL=http://localhost:4000
    depends_on:
      - backend

volumes:
  postgres-data:
  redis-data:
  mongodb-data:
  qdrant-data:
