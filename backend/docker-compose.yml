version: '3.8'
services:
  postgres:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sehatdb
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - '5432:5432'

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - '6379:6379'

  backend:
    build:
      context: ./backend
    restart: on-failure
    depends_on:
      - postgres
      - redis
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/sehatdb
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=devsecret
    ports:
      - '4000:4000'

  ai:
    build:
      context: ./ai
    restart: on-failure
    environment:
      - OPENAI_API_KEY
    ports:
      - '8000:8000'

volumes:
  postgres-data:
